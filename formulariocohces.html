<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venta de coches</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

.hero{
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:rgba(255,255,255,0.95);
    padding:40px;
    width:420px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
    margin-top:0;
    color:#111;
}

p{
    color:#666;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    background:#111;
    color:white;
    padding:14px;
    border:none;
    border-radius:6px;
    font-size:17px;
    cursor:pointer;
}
.iconoWhatsapp {
  display: flex;
  align-items: center;
  gap: 8px;
}
.whatsapp-btn{
  display:flex;
  align-items:center;
  gap:10px;
  background:#25D366;
  color:white;
  padding:12px 16px;
  border-radius:8px;
  text-decoration:none;
  width:fit-content;
  font-weight:bold;
}

button:hover{
    background:#333;
}
</style>

</head>

<body>

<section class="hero">

<div class="container">

<h1>Encuentra tu coche ideal</h1>

<p>Déjanos tus datos y te enviaremos las mejores ofertas.</p>

<form id="formulario">

<input type="text" id="nombre" placeholder="Nombre completo" required>

<input type="email" id="email" placeholder="Correo electrónico" required>

<input type="tel" id="telefono" placeholder="Teléfono" required>

<select id="coche" required>
<option>¿Qué coche buscas?</option>
<option value="SUV">SUV</option>
<option value = "Berlina">Berlina</option>
<option value = "Deportivo">Deportivo</option>
<option value = "Eléctrico">Eléctrico</option>
<option value = "Híbrido">Híbrido</option>
</select>

<button type="submit">Quiero recibir ofertas</button><br>

<br><a class="whatsapp-btn" href="https://wa.me/34600123123?text=Hola%20quiero%20información%20sobre%20coches" target="_blank">
  <img src="imagenes/whatsapp.webp" alt="WhatsApp" width="30" height="30">
  <span>+34600123123</span>
</a>

</form>

</div>

</section>
<script>

document.getElementById("formulario").addEventListener("submit", async function(e){
  e.preventDefault();

  const datos = {
    nombre: document.getElementById("nombre").value,
    email: document.getElementById("email").value,
    telefono: document.getElementById("telefono").value,
    coche: document.getElementById("coche").value
  };

  console.log(datos);

  await fetch("https://script.google.com/macros/s/AKfycbzlPJ1nQT-GoTMn3ZtyN3Likf6zrhX078DnaMAVrfSgQPMrbU665RaunCd2q4Dma2mqow/exec", {
    method: "POST",
    body: JSON.stringify(datos)
  });

  alert("Datos enviados correctamente 🚗");
  this.reset();
});

</script>
</body>
</html>
