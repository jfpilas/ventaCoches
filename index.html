<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venta de coches</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

.hero{
    background:url('imagenes/CIVARO_horizontal_dark.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    box-sizing:border-box;
}

.container{
    background:rgba(255,255,255,0.95);
    padding:40px;
    width:90%;
    max-width:420px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    box-sizing:border-box;
}

h1{
    margin-top:0;
    color:#111;
}

p{
    color:#666;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    background:#111;
    color:white;
    padding:14px;
    border:none;
    border-radius:6px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.whatsapp-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:#25D366;
    color:white;
    padding:12px 16px;
    border-radius:8px;
    text-decoration:none;
    width:100%;
    box-sizing:border-box;
    font-weight:bold;
}

@media (max-width:600px){

    .container{
        padding:25px;
    }

    h1{
        font-size:28px;
        text-align:center;
    }

    p{
        text-align:center;
        font-size:15px;
    }
}
</style>

</head>

<body>

<section class="hero">

<div class="container">

<h1><img style="background-color:black" src="imagenes/CIVARO_favicon_512.png" width="20" alt="Logo">
    Encuentra tu coche ideal</h1>

<p>Déjanos tus datos y te enviaremos las mejores ofertas.</p>

<form id="formulario">

<input type="text" id="nombre" placeholder="Nombre completo" required>

<input type="email" id="email" placeholder="Correo electrónico" required>

<input type="tel" id="telefono" placeholder="Teléfono" required>

<select id="coche" required>
<option>¿Qué coche buscas?</option>
<option value="SUV">SUV</option>
<option value="Berlina">Berlina</option>
<option value="Deportivo">Deportivo</option>
<option value="Eléctrico">Eléctrico</option>
<option value="Híbrido">Híbrido</option>
</select>

<button type="submit">Quiero recibir ofertas</button>

<br><br>

<a class="whatsapp-btn" href="https://wa.me/34632469141?text=Hola%20quiero%20información%20sobre%20coches" target="_blank">
    <img src="imagenes/whatsapp.webp" alt="WhatsApp" width="30" height="30">
    <span>Contáctame</span>
</a><br>
<span><strong>Correo electrónico: </strong>Civaroautomotive@gmail.com</span>


</form>

</div>

</section>

<script>
document.getElementById("formulario").addEventListener("submit", async function(e){
    e.preventDefault();

    const datos = {
        nombre: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        telefono: document.getElementById("telefono").value,
        coche: document.getElementById("coche").value
    };

    console.log(datos);

    await fetch("https://script.google.com/macros/s/AKfycbzlPJ1nQT-GoTMn3ZtyN3Likf6zrhX078DnaMAVrfSgQPMrbU665RaunCd2q4Dma2mqow/exec", {
        method: "POST",
        body: JSON.stringify(datos)
    });

    alert("Datos enviados correctamente 🚗");
    this.reset();
});
</script>

</body>
</html>
